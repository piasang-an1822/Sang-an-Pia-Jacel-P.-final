<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Log In Page | Finals</title>

    <link rel="stylesheet" href="loginformat.css">
    <link rel="icon" href="caticon.jpg" type="image/jpeg">

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;

            display: flex;
            justify-content: center;
            align-items: center;

            height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.2);

            width: 350px;
            text-align: center;
        }

        h1 {
            margin-bottom: 20px;
        }

        label {
            display: block;
            text-align: left;
            margin-top: 15px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;

            border: 1px solid #ccc;
            border-radius: 5px;
        }

        .peak,
        .login {
            margin-top: 20px;
            padding: 10px 20px;

            border: none;
            border-radius: 5px;

            cursor: pointer;
            font-size: 16px;
        }

        .peak {
            background-color: gray;
            color: white;
            margin-right: 10px;
        }

        .login {
            background-color: #4CAF50;
            color: white;
        }

        .peak:hover {
            background-color: #555;
        }

        .login:hover {
            background-color: #45a049;
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>Welcome!</h1>

        <p style="font-size: 20px; font-weight: bold;">
            Please log in to continue
        </p>

        <form action="1st page.html" method="post">

            <label for="username">Username:</label>
            <input type="text"
                   id="username"
                   name="username"
                   placeholder="Enter username"
                   required>

            <label for="password">Password:</label>
            <input type="password"
                   id="password"
                   name="password"
                   placeholder="Enter password"
                   required>

            <button class="peak"
                    type="button"
                    onclick="togglepassword()">
                See Password
            </button>

            <button class="login"
                    type="submit">
                Continue
            </button>

        </form>

    </div>

    <script>
        function togglepassword() {

            const pwd = document.getElementById("password");

            if (pwd.type === "password") {
                pwd.type = "text";
            } else {
                pwd.type = "password";
            }
        }
    </script>

</body>

</html>
